name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: "."
      SQL_ENGINE: django.db.backends.postgresql
      SQL_DATABASE: test_db
      SQL_USER: test_user
      SQL_PASSWORD: test_password
      SQL_HOST: localhost
      SQL_PORT: 5432
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-only-insecure-secret-key-not-for-prod' }}
      DEBUG: "1"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 3. Install Poetry
        run: pip install poetry

      - name: 4. Configure Poetry (sem virtualenv, mais rápido no CI)
        run: poetry config virtualenvs.create false

      - name: 5. Install Dependencies
        run: poetry install --no-root

      - name: 6. Check Formatting (black)
        run: poetry run black . --check

      - name: 7. Check Import Order (isort)
        run: poetry run isort . --check-only

      - name: 8. Check Style (flake8)
        run: poetry run flake8 .

      - name: 9. Run Tests (pytest)
        run: |
          poetry run pytest
          code=$?
          if [ $code -eq 5 ]; then
            echo "Nenhum teste encontrado — ignorando."
            exit 0
          fi
          exit $code
        shell: bash
